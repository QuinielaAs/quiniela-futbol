<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Panel Admin Quiniela</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Panel de Administración ⚙️</h2>

<!-- HORA DE CIERRE -->

<div style="margin:10px 0">

<label><b>Hora límite de cierre:</b></label>

<br><br>

<input
type="datetime-local"
id="horaCierre">

<br><br>

<button onclick="guardarHora()">
Guardar Hora
</button>

<button onclick="borrarHora()">
Reiniciar Hora
</button>

</div>

<hr>

<!-- SEMANA -->

<label><b>Semana:</b></label>

<br><br>

<input
type="number"
id="semana"
value="1"
min="1">

<br><br>

<button onclick="generarExcelGeneral()">
📊  Excel General
</button>
<hr>

<!-- JUGADORES -->

<h3>Jugadores Registrados</h3>

<div id="listaJugadores"></div>

<br>

<button onclick="mostrarJugadores()">
Ver Jugadores
</button>

<br><br>

<!-- BORRAR SEMANA -->

<button 
onclick="borrarJugadores()"

style="
background:red;
color:white;
padding:8px 15px;
border:none;
cursor:pointer">

🗑️ Borrar Jugadores (Nueva Semana)

</button>

<!-- LIBRERIA PDF -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- SCRIPT PRINCIPAL -->

<script src="script.js"></script>

<script>

mostrarJugadores();

</script>

</body>

  </html>
