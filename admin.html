<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Panel Admin Quiniela</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Panel de Administración ⚙️</h2>

<!-- HORA -->
<div>
<label><b>Hora límite:</b></label><br><br>
<input type="datetime-local" id="horaCierre">
<br><br>
<button onclick="guardarHora()">Guardar Hora</button>
<button onclick="borrarHora()">Reiniciar Hora</button>
</div>

<hr>

<!-- SEMANA -->
<label><b>Semana:</b></label><br><br>
<input type="number" id="semana" value="1" min="1">
<br><br>

<button onclick="generarPDFGeneral()">📄 PDF</button>
<button onclick="exportarExcel()">📊 Excel</button>

<hr>

<!-- RESULTADOS -->
<h3>Resultados</h3>
<div id="resultados"></div>

<button onclick="guardarResultados()">💾 Guardar Resultados</button>

<hr>

<!-- JUGADORES -->
<h3>Jugadores</h3>
<div id="listaJugadores"></div>

<br>
<button onclick="mostrarJugadores()">Ver Jugadores</button>

<br><br>

<button onclick="borrarJugadores()" style="background:red;color:white;padding:8px 15px;border:none;">
🗑️ Nueva Semana
</button>

<!-- LIBRERIAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="script.js"></script>

<script>
mostrarJugadores();
mostrarResultados();
</script>

</body>
</html>
