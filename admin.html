<body>

<h2>✖️ Administración Quiniela ✖️</h2>

<!-- ===========================
HORA DE CIERRE
=========================== -->

<div style="margin:10px 0">

<label><b>Hora límite de cierre:</b></label>

<br><br>

<input
type="datetime-local"
id="horaCierre">

<br><br>

<button onclick="guardarHora()">
💾 Guardar Hora
</button>

<button onclick="borrarHora()">
🔄 Reiniciar Hora
</button>

</div>

<hr>

<!-- ===========================
SEMANA
=========================== -->

<label><b>Semana:</b></label>

<br><br>

<input
type="number"
id="semana"
value="1"
min="1">

<br><br>

<button onclick="generarExcelGeneral()">

📊 Generar Excel General

</button>

<hr>

<!-- ===========================
JUGADORES
=========================== -->

<h3>Jugadores Registrados</h3>

<div id="listaJugadores"></div>

<br>

<button onclick="mostrarJugadores()">

👀 Ver Jugadores

</button>

<br><br>

<!-- ===========================
BORRAR NUEVA SEMANA
=========================== -->

<button
onclick="borrarJugadores()"

style="
background:red;
color:white;
padding:10px 18px;
border:none;
cursor:pointer;
font-weight:bold">

🗑️ Borrar Jugadores (Nueva Semana)

</button>

<hr>
